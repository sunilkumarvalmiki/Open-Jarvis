name: Feature Request
description: Suggest a new feature or enhancement for Open-Jarvis
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your interest in improving Open-Jarvis! Please describe your feature request below.
  
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Please describe.
      placeholder: A clear and concise description of what the problem is. Ex. I'm always frustrated when [...]
    validations:
      required: true
  
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like
      placeholder: A clear and concise description of what you want to happen.
    validations:
      required: true
  
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered
      placeholder: A clear and concise description of any alternative solutions or features you've considered.
  
  - type: dropdown
    id: feature-area
    attributes:
      label: Feature Area
      description: Which area of Open-Jarvis does this feature relate to?
      options:
        - Voice Control
        - MCP Integration
        - User Interface
        - System Automation
        - Configuration
        - Cross-Project Integration
        - Performance
        - Security
        - Documentation
        - Other
    validations:
      required: true
  
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Critical - I cannot use the app without this
        - High - This would significantly improve my workflow
        - Medium - This would be nice to have
        - Low - This is just a suggestion
    validations:
      required: true
  
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Describe your use case for this feature
      placeholder: Explain how you would use this feature in your workflow
    validations:
      required: true
  
  - type: textarea
    id: implementation
    attributes:
      label: Implementation Ideas
      description: If you have any ideas about how this could be implemented, please share them
      placeholder: Technical implementation details or suggestions (optional)
  
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or mockups about the feature request here
  
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      description: Please confirm the following
      options:
        - label: I have searched existing issues to make sure this is not a duplicate
          required: true
        - label: I have provided all the information requested above
          required: true
        - label: I am willing to help implement this feature (if applicable)
          required: false
