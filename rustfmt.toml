# Rust formatting configuration for Open-Jarvis

# Maximum line width
max_width = 100

# Use hard tabs
hard_tabs = false
tab_spaces = 4

# Edition
edition = "2021"

# Use field initialization shorthand
use_field_init_shorthand = true

# Use try shorthand
use_try_shorthand = true

# Newline style
newline_style = "Unix"

# Reorder imports and modules
reorder_imports = true
reorder_modules = true

# Merge derives
merge_derives = true

